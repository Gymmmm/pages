<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发送 USDT - Tron 网络</title>
    <style>
        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 420px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        header {
            background: linear-gradient(135deg, #26a69a, #00897b);
            color: white;
            text-align: center;
            padding: 20px 15px;
        }
        h1 {
            margin: 0;
            font-size: 22px;
        }
        .content {
            padding: 20px;
        }
        .section {
            margin-bottom: 25px;
        }
        label {
            display: block;
            font-size: 15px;
            margin-bottom: 8px;
            color: #555;
        }
        .address {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            word-break: break-all;
            border: 1px solid #ddd;
            font-size: 14px;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .balance {
            font-size: 14px;
            color: #26a69a;
            margin-top: 5px;
        }
        .fee {
            background: #fff8e1;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 15px;
            background: #26a69a;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #00897b;
        }
        .note {
            font-size: 13px;
            color: #d32f2f;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>发送 USDT</h1>
            <p>Tron 网络 (TRC20)</p>
        </header>
        
        <div class="content">
            <div class="section">
                <label>收款地址</label>
                <div class="address">TVs1TTmpScP4AKLHMof8Ft8WeAQ4KGGzoZ</div>
            </div>

            <div class="section">
                <label>转账金额 (USDT)</label>
                <input type="number" placeholder="输入金额" value="100" step="0.01">
                <div class="balance">可用: 加载中... USDT</div>
            </div>

            <div class="section">
                <label>备注 (需支付 1 TRX)</label>
                <input type="text" placeholder="请输入备注信息">
            </div>

            <div class="section fee">
                <strong>矿工费</strong><br>
                ≈ $1.5688<br>
                4.746 TRX
            </div>

            <button onclick="alert('这是一个学习测试页面，没有实际转账功能。\n\n仅用于本地练习 HTML。')">确认转账</button>

            <div class="note">
                ⚠️ 这是一个仅供本地学习测试的静态 HTML 示例。<br>
                请勿用于任何真实转账或部署到公网。
            </div>
        </div>
    </div>
</body>
</html>
